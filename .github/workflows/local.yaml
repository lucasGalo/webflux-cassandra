name: Deploy
on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Docker metadata
        id: docker_meta
        uses: crazy-max/ghaction-docker-meta@v1
        with:
          images: lucasgalo/webflux-cassandra
          tag-sha: true

      - name: QEMU
        uses: docker/setup-qemu-action@v1

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to Dockerhub
        uses: docker/login-action@v1
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v2
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/386
          tags: ${{steps.docker_meta.outputs.tags}}
          labels: ${{steps.docker_meta.outputs.labels}}

      # Em vez de instalar doctl/dokube, configure o kubeconfig local
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_LOCAL }}" > $HOME/.kube/config
          kubectl config set-cluster local --server=http://152.250.12.40:6443 --insecure-skip-tls-verify=true
          kubectl config set-context local --cluster=local --user=default
          kubectl config use-context local

      - name: Set deployment image
        run: kubectl set image deployment webflux-cassandra webflux-cassandra=lucasgalo/webflux-cassandra:${{steps.docker_meta.outputs.version}}
